[manifest]
version = "1.0.0"
priority = -2

[vars]

[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = 'replace_card.states.visible = false'
position = 'before'
payload = '''
SMODS.change_base(replace_card, "Hearts", nil)
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
G.SPLASH_LOGO = Sprite(0, 0, 
        13*SC_scale, 
        13*SC_scale*(G.ASSET_ATLAS["balatro"].py/G.ASSET_ATLAS["balatro"].px),
        G.ASSET_ATLAS["balatro"], {x=0,y=0})
'''
position = 'at'
payload = '''
G.SPLASH_LOGO = Sprite(0, 0,
		13*SC_scale,
		13*SC_scale*(G.ASSET_ATLAS["UT_splash"].py/G.ASSET_ATLAS["UT_splash"].px),
		G.ASSET_ATLAS["UT_splash"], {x=0,y=0})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = 'if not initial then G.GAME.blind:debuff_card(self) end'
position = 'before'
payload = '''
initial = true
'''
match_indent = true