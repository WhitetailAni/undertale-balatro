[manifest]
version = "1.0.0"
priority = -2

[vars]

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if self.ability.name == 'Golden Joker' then
	return self.ability.extra
end
'''
position = "at"
payload = '''
if self.ability.name == 'Golden Joker' or self.label == 'j_UT_burgerpants' or (self.label == 'j_UT_end' and self.ability.was_boss) then
	return self.ability.extra
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "if change_context ~= 'splash' then "
position = "before"
payload = '''
G.P_CENTERS.e_foil.config.chips = 50
G.P_CENTERS.e_holo.config.mult = 10
G.P_CENTERS.e_polychrome.config.x_mult = 1.5
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "G.GAME.discount_percent = center_table.extra"
position = "at"
payload = "G.GAME.discount_percent = G.GAME.discount_percent + center_table.extra"
match_indent = false

#much like cloudy glasses this requires swapping an SMODS function back. i fucking hate doing this but i cant get lovely to patch into smods.
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
SMODS.calculate_main_scoring({cardarea = v, full_hand = G.play.cards, scoring_hand = scoring_hand, scoring_name = text, poker_hands = poker_hands}, v == G.play and scoring_hand or nil)
'''
position = "at"
payload = '''
local context = {cardarea = v, full_hand = G.play.cards, scoring_hand = scoring_hand, scoring_name = text, poker_hands = poker_hands}
local scoring_hand_2 = (v == G.play and scoring_hand or nil)

for _, card in ipairs(context.cardarea.cards) do
	local in_scoring = scoring_hand_2 and SMODS.in_scoring(card, context.scoring_hand)
	--add cards played to list
	if scoring_hand_2 and not SMODS.has_no_rank(card) and in_scoring then
		G.GAME.cards_played[card.base.value].total = G.GAME.cards_played[card.base.value].total + 1
		if not SMODS.has_no_suit(card) then
			G.GAME.cards_played[card.base.value].suits[card.base.suit] = true
		end
	end
	--if card is debuffed
	if scoring_hand_2 and card.debuff then
		if in_scoring then 
			G.GAME.blind.triggered = true
			
			G.E_MANAGER:add_event(Event({
				trigger = 'immediate',
				func = (function() SMODS.juice_up_blind();return true end)
			}))
			card_eval_status_text(card, 'debuff')
			SMODS.calculate_context({debuffed_individual = true, other_card = new_card})
		end
	else
		if scoring_hand_2 then
			if in_scoring then context.cardarea = G.play else context.cardarea = 'unscored' end
		end
		SMODS.score_card(card, context)
	end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
local text,disp_text,poker_hands,scoring_hand,non_loc_disp_text = G.FUNCS.get_poker_hand_info(G.play.cards)
'''
position = "after"
payload = '''
if #SMODS.find_card("j_UT_CORE") > 0 and text == 'Straight' then
	text = 'Straight Flush'
	disp_text = localize('Straight Flush', 'poker_hands')
	non_loc_disp_text = 'Straight Flush'
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = '''
local text,disp_text,poker_hands = G.FUNCS.get_poker_hand_info(self.highlighted)
'''
position = "after"
payload = '''
if #SMODS.find_card("j_UT_CORE") > 0 and text == 'Straight' then
	text = 'Straight Flush'
	disp_text = localize('Straight Flush', 'poker_hands')
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/misc_functions.lua"
pattern = '''
enhanced = G.C.SECONDARY_SET.Enhanced
'''
position = "before"
payload = '''
gaster = G.C.GASTER,
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "globals.lua"
pattern = '''
RENTAL = HEX('b18f43'),
'''
position = "after"
payload = '''
GASTER = HEX('000000'),
'''
match_indent = true



